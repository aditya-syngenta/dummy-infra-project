# Kubernetes Services
# BUG: All services use ClusterIP but API gateway should be LoadBalancer or use Ingress
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      # BUG: targetPort doesn't match container port (5000 in Dockerfile, 8000 in app)
      targetPort: 5000
  type: ClusterIP  # BUG: Should be LoadBalancer or NodePort for external access
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: default
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8003
      targetPort: 8003
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: default
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004
  type: ClusterIP
